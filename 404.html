<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zoskyCube @ twitch.tv</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #020617;
        color: #e2e8f0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .card {
        max-width: 720px;
        margin: 16px;
        border: 1px solid rgba(168, 85, 247, 0.35);
        background: rgba(15, 23, 42, 0.92);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }
      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: #c4b5fd;
      }
      h1 {
        margin: 10px 0 8px;
        font-size: 30px;
        color: #ffffff;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: #cbd5e1;
      }
      a {
        display: inline-block;
        margin-top: 18px;
        color: #67e8f9;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">404</div>
      <h1>Page Not Found</h1>
      <p>This route is not available as a direct static path on this host.</p>
      <a href="/">Go to home</a>
    </main>
  </body>
</html>
